<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container">

        <div id="div-input">   
            <h1 id="h1-header">Metric/Imperial Unit Conversion</h1>
            <input id="input-header" type="number" placeholder="20">
            <button id="convert-btn">Convert</button>
        </div>
        <div id="div-input-2">
            <div class="calculation">
                <h2 class="h2">Length (Meter/Feet)</h2>
                <p id="meter-description">20 meters = 65.616 feet | 20 feet = 6.096 meters</p>
            </div>

            <div class="calculation">
                <h2 class="h2">Volume (Liters/Gallons)</h2>
                <p id="liter-description">20 liters = 5.284 gallons | 20 gallons = 75.708 liters</p>
            </div>

            <div class="calculation">
                <h2 class="h2">Mass (Kilograms/Pounds)</h2>
                <p id="kilo-description">20 kilos = 44.092 pounds | 20 pounds = 9.072 kilos</p>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
